name: Deploy to GitHub Pages

# index.html(루트)을 GitHub Pages로 자동 배포합니다.
# main 브랜치에 push 할 때마다 실행됩니다.

on:
  push:
    branches: [main]
  workflow_dispatch:   # 액션 탭에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 배포만 진행 (중복 실행 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # Pages가 꺼져 있어도 워크플로가 자동으로 켭니다

      - name: Upload artifact (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
